spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: PayGate
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/paygatedb}
    username: ${DB_USER:}
    password: ${DB_PASS:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081